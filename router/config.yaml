server:
  host: "0.0.0.0"
  port: 5000

router:
  strategy: "llm"
  router_model:
    api_base: "http://127.0.0.1:8080/v1"
    api_key: "local-token"
    model: "qwen-0.8b-routing"

classification_rules:
  system_prompt: |
    Analyze the request complexity. Respond with exactly one of:
    - simple boilerplate: agent-simple-core
    - moderate complexity: agent-medium-core
    - deep algorithms: agent-complex-core
    - heavy reasoning, advanced architecture, deep multi-step analysis: agent-reasoning-core
    - extremely complex across many files: agent-advanced-core
    Do not add markdown formatting. Only the model name string.

# 4-tier classifier dispatch backends — all proxied through LiteLLM (port 4000).
#  Tiers (complexity ↑):
#    agent-simple-core    — trivial / syntax / boilerplate (cheapest model)
#    agent-medium-core    — moderate logic, light refactoring
#    agent-reasoning-core — deep logic/agy proxy tier
#    agent-complex-core   — multi-file tracing, algorithmic
#    agent-advanced-core  — system architecture, deep reasoning
#  + openrouter-auto      — catch-all fallback (also routed via LiteLLM)
#  The api_key placeholder is resolved at runtime by main.py:788.
backends:
  - name: "agent-simple-core"
    api_base: "http://127.0.0.1:4000/v1"
    api_key: "DYNAMIC_LITELLM_MASTER_KEY_PLACEHOLDER"
  - name: "agent-medium-core"
    api_base: "http://127.0.0.1:4000/v1"
    api_key: "DYNAMIC_LITELLM_MASTER_KEY_PLACEHOLDER"
  - name: "agent-complex-core"
    api_base: "http://127.0.0.1:4000/v1"
    api_key: "DYNAMIC_LITELLM_MASTER_KEY_PLACEHOLDER"
  - name: "agent-reasoning-core"
    api_base: "http://127.0.0.1:4000/v1"
    api_key: "DYNAMIC_LITELLM_MASTER_KEY_PLACEHOLDER"
  - name: "agent-advanced-core"
    api_base: "http://127.0.0.1:4000/v1"
    api_key: "DYNAMIC_LITELLM_MASTER_KEY_PLACEHOLDER"
  - name: "openrouter-auto"
    api_base: "http://127.0.0.1:4000/v1"
    api_key: "DYNAMIC_LITELLM_MASTER_KEY_PLACEHOLDER"
