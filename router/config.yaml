server:
  host: "0.0.0.0"
  port: 5000

router:
  strategy: "llm"
  router_model:
    api_base: "http://127.0.0.1:8080/v1"
    api_key: "os.environ/ROUTER_API_KEY"
    model: "gemma4-26a4b-routing"

classification_rules:
  system_prompt: |
    Classify the coding task complexity. Output ONLY the tier name.

    agent-simple-core: trivial one-liners, syntax fixes, single-line edits
    agent-medium-core: single-function changes, light refactoring, simple tests
    agent-complex-core: multi-file changes, algorithmic work, data pipelines
    agent-reasoning-core: deep analysis, architecture decisions, debugging complex systems
    agent-advanced-core: system-level architecture, cross-cutting concerns, novel design

    Task:

# 5-tier classifier dispatch backends — all proxied through LiteLLM (port 4000).
#  Tiers (complexity ↑):
#    agent-simple-core    — trivial / syntax / boilerplate (cheapest model)
#    agent-medium-core    — moderate logic, light refactoring
#    agent-complex-core   — multi-file tracing, algorithmic
#    agent-reasoning-core — heavy reasoning, deep multi-step analysis
#    agent-advanced-core  — system architecture, deep reasoning
#  Premium backends (also proxied through LiteLLM):
#    ollama-deepseek-v4-pro — paid Ollama.com tier (LiteLLM ollama_chat provider)
#  + openrouter-auto      — catch-all fallback (also routed via LiteLLM)
#  The api_key placeholder is resolved at runtime by main.py:788.
backends:
  - name: "agent-simple-core"
    api_base: "http://127.0.0.1:LITELLM_PORT_PLACEHOLDER/v1"
    api_key: "DYNAMIC_LITELLM_MASTER_KEY_PLACEHOLDER"
  - name: "agent-medium-core"
    api_base: "http://127.0.0.1:LITELLM_PORT_PLACEHOLDER/v1"
    api_key: "DYNAMIC_LITELLM_MASTER_KEY_PLACEHOLDER"
  - name: "agent-complex-core"
    api_base: "http://127.0.0.1:LITELLM_PORT_PLACEHOLDER/v1"
    api_key: "DYNAMIC_LITELLM_MASTER_KEY_PLACEHOLDER"
  - name: "agent-reasoning-core"
    api_base: "http://127.0.0.1:LITELLM_PORT_PLACEHOLDER/v1"
    api_key: "DYNAMIC_LITELLM_MASTER_KEY_PLACEHOLDER"
  - name: "agent-advanced-core"
    api_base: "http://127.0.0.1:LITELLM_PORT_PLACEHOLDER/v1"
    api_key: "DYNAMIC_LITELLM_MASTER_KEY_PLACEHOLDER"
  - name: "ollama-deepseek-v4-pro"
    api_base: "http://127.0.0.1:LITELLM_PORT_PLACEHOLDER/v1"
    api_key: "DYNAMIC_LITELLM_MASTER_KEY_PLACEHOLDER"
  - name: "ollama-deepseek-v4-flash"
    api_base: "http://127.0.0.1:LITELLM_PORT_PLACEHOLDER/v1"
    api_key: "DYNAMIC_LITELLM_MASTER_KEY_PLACEHOLDER"
  - name: "openrouter-auto"
    api_base: "http://127.0.0.1:LITELLM_PORT_PLACEHOLDER/v1"
    api_key: "DYNAMIC_LITELLM_MASTER_KEY_PLACEHOLDER"
