general_settings:
  master_key: sk-lit...33bf
litellm_settings:
  # -------------------------------------------------------------------------
  # FALLBACK CHAINS (cascading, in order of escalation)
  # Simple → medium → complex → reasoning → advanced → openrouter-auto
  # When one tier fails, LiteLLM tries the next model in the chain.
  # All tiers fall back through increasingly capable models, then to openrouter-auto.
  # local-qwen-3.6 (35B) disabled 2026-06-08 — frees 23GB RAM/GTT.
  # -------------------------------------------------------------------------
  cache: true
  cache_params:
    host: 127.0.0.1
    mode: default
    port: 6379
    ttl: 3600
    type: redis
  caching_backend: redis
  callbacks:
  - langfuse
  detailed_debug: false
  drop_params: true
  fallbacks:
  - agent-simple-core:
    - agent-medium-core
    - agent-complex-core
    - agent-reasoning-core
    - agent-advanced-core
    - openrouter-auto
    # - local-qwen-3.6  # DISABLED: 35B model unloaded (23GB GTT saved)
  - agent-medium-core:
    - agent-complex-core
    - agent-reasoning-core
    - agent-advanced-core
    - openrouter-auto
    # - local-qwen-3.6  # DISABLED
  - agent-complex-core:
    - agent-reasoning-core
    - agent-advanced-core
    - openrouter-auto
    # - local-qwen-3.6  # DISABLED
  - agent-reasoning-core:
    - agent-advanced-core
    - openrouter-auto
    # - local-qwen-3.6  # DISABLED
  - agent-advanced-core:
    - openrouter-auto
    # - local-qwen-3.6  # DISABLED
model_list:
- litellm_params:
    model: openrouter/openrouter/auto
    request_timeout: 120
  model_name: openrouter-auto
# DISABLED 2026-06-08 — 20GB on disk, 23GB GTT (system RAM as GPU buffer).
# Uncomment to re-enable once a lighter model replaces it.
#- litellm_params:
#    api_base: http://127.0.0.1:8080/v1
#    api_key: local-token
#    model: openai/qwen-35b-q4ks
#    request_timeout: 300
#  model_name: local-qwen-3.6
- litellm_params:
    api_base: http://127.0.0.1:8080/v1
    api_key: local-token
    model: openai/nomic-embed-text-v1.5-Q4_K_M
    request_timeout: 30
  model_name: local-nomic-embed
# Free model deployments per tier — latency-based routing picks fastest.
# Multiple entries with same model_name = deployment pool for that tier.
# openrouter-auto is fallback-only (in chain, never in same-tier pool).
- model_name: agent-simple-core
  litellm_params:
    model: openrouter/nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free
    request_timeout: 120
- model_name: agent-simple-core
  litellm_params:
    model: openrouter/poolside/laguna-xs.2:free
    request_timeout: 120
- model_name: agent-simple-core
  litellm_params:
    model: openrouter/liquid/lfm-2.5-1.2b-instruct:free
    request_timeout: 120
- model_name: agent-medium-core
  litellm_params:
    model: openrouter/poolside/laguna-m.1:free
    request_timeout: 120
- model_name: agent-medium-core
  litellm_params:
    model: openrouter/google/gemma-4-26b-a4b-it:free
    request_timeout: 120
- model_name: agent-medium-core
  litellm_params:
    model: openrouter/minimax/minimax-m2.5:free
    request_timeout: 120
- model_name: agent-complex-core
  litellm_params:
    model: openrouter/google/gemma-4-31b-it:free
    request_timeout: 120
- model_name: agent-complex-core
  litellm_params:
    model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
    request_timeout: 120
- model_name: agent-complex-core
  litellm_params:
    model: openrouter/deepseek/deepseek-v4-flash:free
    request_timeout: 120
- model_name: agent-reasoning-core
  litellm_params:
    model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
    request_timeout: 120
- model_name: agent-reasoning-core
  litellm_params:
    model: openrouter/moonshotai/kimi-k2.6:free
    request_timeout: 120
- model_name: agent-advanced-core
  litellm_params:
    model: openrouter/moonshotai/kimi-k2.6:free
    request_timeout: 120
- model_name: agent-advanced-core
  litellm_params:
    model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
    request_timeout: 120
redis_settings:
  redis_host: 127.0.0.1
  redis_port: 6379
router_settings:
  allowed_fails: 2
  cooldown_time: 30
  enable_pre_call_checks: false
  num_retries: 1
  routing_strategy: latency-based-routing
vector_store_settings:
  collection_name: litellm_semantic_cache
  connection_string: postgresql://postgres:***@127.0.0.1:5432/postgres
  embedding_model: local-nomic-embed
  store_type: postgres
