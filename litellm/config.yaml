general_settings:
  master_key: sk-lit...33bf
litellm_settings:
  # -------------------------------------------------------------------------
  # FALLBACK CHAINS (cascading, in order of escalation)
  # Simple → medium → complex → reasoning → advanced → openrouter-auto
  # When one tier fails, LiteLLM tries the next model in the chain.
  # All tiers fall back through increasingly capable models, then to openrouter-auto.
  # local-qwen-3.6 (35B) disabled 2026-06-08 — frees 23GB RAM/GTT.
  # -------------------------------------------------------------------------
  cache: true
  cache_params:
    host: 127.0.0.1
    mode: default
    port: 6379
    ttl: 3600
    type: redis
  caching_backend: redis
  callbacks:
  - langfuse
  detailed_debug: false
  drop_params: true
  fallbacks:
  - agent-simple-core:
    - agent-medium-core
    - agent-complex-core
    - agent-reasoning-core
    - agent-advanced-core
    - openrouter-auto
    # - local-qwen-3.6  # DISABLED: 35B model unloaded (23GB GTT saved)
  - agent-medium-core:
    - agent-complex-core
    - agent-reasoning-core
    - agent-advanced-core
    - openrouter-auto
    # - local-qwen-3.6  # DISABLED
  - agent-complex-core:
    - agent-reasoning-core
    - agent-advanced-core
    - openrouter-auto
    # - local-qwen-3.6  # DISABLED
  - agent-reasoning-core:
    - agent-advanced-core
    - openrouter-auto
    # - local-qwen-3.6  # DISABLED
  - agent-advanced-core:
    - openrouter-auto
    # - local-qwen-3.6  # DISABLED
  - ollama-deepseek-v4-pro:
    - agent-advanced-core
  - ollama-deepseek-v4-flash:
    - agent-reasoning-core
model_list:
- litellm_params:
    model: openrouter/openrouter/auto
    request_timeout: 120
  model_name: openrouter-auto
# DISABLED 2026-06-08 — 20GB on disk, 23GB GTT (system RAM as GPU buffer).
# Uncomment to re-enable once a lighter model replaces it.
#- litellm_params:
#    api_base: http://127.0.0.1:8080/v1
#    api_key: local-token
#    model: openai/qwen-35b-q4ks
#    request_timeout: 300
#  model_name: local-qwen-3.6
- litellm_params:
    api_base: http://127.0.0.1:8080/v1
    api_key: local-token
    model: openai/nomic-embed-text-v1.5-Q4_K_M
    request_timeout: 30
  model_name: local-nomic-embed

# ================================================================================
# OLLAMA PAID TIER — ollama.com via LiteLLM's native ollama_chat provider.
# LiteLLM calls https://api.ollama.com/api/chat with Bearer auth (OLLAMA_API_KEY).
# Fallback: ollama-deepseek-v4-pro → agent-advanced-core → openrouter-auto.
# ================================================================================
- model_name: ollama-deepseek-v4-pro
  litellm_params:
    model: ollama_chat/deepseek-v4-pro
    api_base: https://api.ollama.com
    api_key: os.environ/OLLAMA_API_KEY
    request_timeout: 120

# ================================================================================
# OLLAMA FLASH TIER — lighter/faster model for reasoning-tier requests.
# Fallback: ollama-deepseek-v4-flash → agent-reasoning-core → openrouter-auto.
# ================================================================================
- model_name: ollama-deepseek-v4-flash
  litellm_params:
    model: ollama_chat/deepseek-v4-flash
    api_base: https://api.ollama.com
    api_key: os.environ/OLLAMA_API_KEY
    request_timeout: 120

# ================================================================================
# AGENT TIER DEPLOYMENTS — safety-net entries (one per tier)
# The DB roster sync (router/main.py) is the DYNAMIC source of truth and
# registers the full AA-scored deployment pool at startup via LiteLLM's
# /model/new admin API. These static entries guarantee each tier name exists
# even before the first roster sync runs (prevents "model not found" on cold
# start). Each tier gets exactly ONE reliable free model that is always
# available. The roster sync adds the remaining AA-scored models on startup.
#
# TIER THRESHOLDS (normalized AA score):
#   n >= 80 → agent-advanced-core
#   n >= 75 → agent-reasoning-core
#   n >= 68 → agent-complex-core
#   n >= 60 → agent-medium-core
#   else    → agent-simple-core
#
# CURRENT AA SCORES (2026-06-08, max=55.0):
#   minimax/minimax-m2.5:free          → 55.0 (norm=100.0) — advanced safety net
#   moonshotai/kimi-k2.6:free           → 54.0 (norm=98.2)  — reasoning safety net
#   nvidia/nemotron-3-ultra-550b-a55b   → 48.0 (norm=87.3)  — complex safety net
#   google/gemma-4-26b-a4b-it:free      → 40.0 (norm=72.7)  — medium safety net
#   nvidia/nemotron-3-nano-30b-a3b:free → 28.0 (norm=50.9)  — simple safety net
# ================================================================================

- model_name: agent-advanced-core
  litellm_params:
    model: openrouter/minimax/minimax-m2.5:free
    request_timeout: 120
- model_name: agent-reasoning-core
  litellm_params:
    model: openrouter/moonshotai/kimi-k2.6:free
    request_timeout: 120
- model_name: agent-complex-core
  litellm_params:
    model: openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
    request_timeout: 120
- model_name: agent-medium-core
  litellm_params:
    model: openrouter/google/gemma-4-26b-a4b-it:free
    request_timeout: 120
- model_name: agent-simple-core
  litellm_params:
    model: openrouter/nvidia/nemotron-3-nano-30b-a3b:free
    request_timeout: 120

redis_settings:
  redis_host: 127.0.0.1
  redis_port: 6379
router_settings:
  allowed_fails: 2
  cooldown_time: 30
  enable_pre_call_checks: false
  num_retries: 1
  routing_strategy: latency-based-routing
vector_store_settings:
  collection_name: litellm_semantic_cache
  connection_string: postgresql://postgres:***@127.0.0.1:5432/postgres
  embedding_model: local-nomic-embed
  store_type: postgres
