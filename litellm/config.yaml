model_list:
  # =========================================================================
  # COMPLEX TIERS: OpenRouter Kimi K2.6 (Free) -> Local Qwen MoE (Optimized)
  # =========================================================================
  - model_name: agent-complex-core
    litellm_params:
      model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
      api_key: "os.environ/OPENROUTER_API_KEY"

  - model_name: agent-complex-core-kimi
    litellm_params:
      model: openrouter/moonshotai/kimi-k2.6:free
      api_key: "os.environ/OPENROUTER_API_KEY"

  - model_name: agent-complex-core-gptoss
    litellm_params:
      model: openrouter/openai/gpt-oss-120b:free
      api_key: "os.environ/OPENROUTER_API_KEY"

  - model_name: local-qwen-3.6-complex
    litellm_params:
      model: openai/qwen-35b-q4ks
      api_base: http://127.0.0.1:8080/v1
      api_key: local-token
      request_timeout: 300

  # =========================================================================
  # SIMPLE TIERS: OpenRouter Gemma 4 -> Local Qwen Fast (Optimized)
  # =========================================================================
  - model_name: agent-simple-core
    litellm_params:
      model: openrouter/google/gemma-4-31b-it:free
      api_key: "os.environ/OPENROUTER_API_KEY"

  - model_name: local-qwen-3.6-simple
    litellm_params:
      model: openai/qwen-35b-q4ks
      api_base: http://127.0.0.1:8080/v1
      api_key: local-token
      request_timeout: 300

# =========================================================================
# GLOBAL SYSTEM POLICIES
# =========================================================================
router_settings:
  cooldown_time: 5
  allowed_fails: 3
  num_retries: 1
  routing_strategy: "simple-shuffle"
  fallbacks:
    - agent-complex-core: ["agent-complex-core-kimi", "agent-complex-core-gptoss", "local-qwen-3.6-complex"]
    - agent-simple-core: ["local-qwen-3.6-simple"]

litellm_settings:
  callbacks: ["langfuse"]
  drop_params: true
  caching: true
  caching_backend: "redis"

# Shared local Valkey cache connection profile
redis_settings:
  redis_host: "127.0.0.1"
  redis_port: 6379