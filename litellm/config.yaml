model_list:
  # =========================================================================
  # COMPLEX TIERS: Gemini 3.5 (High/Med/Low) -> Nemotron -> Local Qwen MTP
  # =========================================================================
  - model_name: agent-complex-core
    litellm_params:
      model: gemini/gemini-3.5-flash
      api_key: "os.environ/GEMINI_OAUTH_TOKEN"
      reasoning_effort: high

  - model_name: gemini-3.5-medium
    litellm_params:
      model: gemini/gemini-3.5-flash
      api_key: "os.environ/GEMINI_OAUTH_TOKEN"
      reasoning_effort: medium

  - model_name: gemini-3.5-low
    litellm_params:
      model: gemini/gemini-3.5-flash
      api_key: "os.environ/GEMINI_OAUTH_TOKEN"
      reasoning_effort: minimal

  - model_name: openrouter-nemotron
    litellm_params:
      model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
      api_key: "os.environ/OPENROUTER_API_KEY"

  - model_name: local-qwen-3.6-complex
    litellm_params:
      model: openai/qwen-35b-q5kxl
      api_base: http://127.0.0.1:8080/v1
      api_key: local-token
      request_timeout: 300

  # =========================================================================
  # SIMPLE TIERS: Gemini 3.1 Lite -> OpenRouter Gemma MoE -> Local Qwen Fast
  # =========================================================================
  - model_name: agent-simple-core
    litellm_params:
      model: gemini/gemini-3.1-flash-lite-preview
      api_key: "os.environ/GEMINI_OAUTH_TOKEN"

  - model_name: openrouter-gemma4
    litellm_params:
      model: openrouter/google/gemma-4-26b-a4b-it:free
      api_key: "os.environ/OPENROUTER_API_KEY"

  - model_name: local-qwen-3.6-simple
    litellm_params:
      model: openai/qwen-35b-q4ks
      api_base: http://127.0.0.1:8080/v1
      api_key: local-token
      request_timeout: 300

# =========================================================================
# GLOBAL SYSTEM POLICIES
# =========================================================================
router_settings:
  enable_fallbacks: true
  cooldown_time: 45
  allowed_fails: 1
  retry_after_cooldown: true

litellm_settings:
  callbacks: ["langfuse"]
  drop_params: true  # Strip reasoning_effort when falling back to models that don't support it
  caching: true
  caching_backend: "redis"
  fallbacks:
    - agent-complex-core: ["gemini-3.5-medium", "gemini-3.5-low", "openrouter-nemotron", "local-qwen-3.6-complex"]
    - agent-simple-core: ["openrouter-gemma4", "local-qwen-3.6-simple"]

# Shared local Valkey cache connection profile
redis_settings:
  redis_host: "127.0.0.1"
  redis_port: 6379
