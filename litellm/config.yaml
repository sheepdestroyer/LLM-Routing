model_list:
  - model_name: local-qwen-3.6
    litellm_params:
      model: openai/qwen-35b-q4ks
      api_base: http://127.0.0.1:8080/v1
      api_key: local-token
      request_timeout: 300
  - model_name: openrouter-auto
    litellm_params:
      model: openrouter/openrouter/auto
      request_timeout: 120
  # Local embedding model for zero-cost semantic cache
  - model_name: local-nomic-embed
    litellm_params:
      model: openai/nomic-embed-text-v1.5-Q4_K_M
      api_base: http://127.0.0.1:8080/v1
      api_key: local-token
      request_timeout: 30
  # -------------------------------------------------------------------------
  # Triage-router backend mappings (4-tier classifier dispatch targets)
  # The FastAPI triage router (port 5000) returns one of these model names
  # based on prompt-complexity analysis. All four route through OpenRouter
  # "auto" by default; override the underlying `model:` field below to target
  # specific providers per tier (e.g. free-tier lightweight for simple-core).
  # -------------------------------------------------------------------------
  - model_name: agent-simple-core
    litellm_params:
      model: openrouter/openrouter/auto
      request_timeout: 120
  - model_name: agent-medium-core
    litellm_params:
      model: openrouter/openrouter/auto
      request_timeout: 120
  - model_name: agent-complex-core
    litellm_params:
      model: openrouter/openrouter/auto
      request_timeout: 120
  - model_name: agent-advanced-core
    litellm_params:
      model: openrouter/openrouter/auto
      request_timeout: 120

# =========================================================================
# GLOBAL SYSTEM POLICIES
# =========================================================================
router_settings:
  cooldown_time: 30
  allowed_fails: 2
  num_retries: 1
  enable_pre_call_checks: true
  routing_strategy: "latency-based-routing"
  fallbacks:
    # Each tier falls back through OpenRouter dynamic auto, then local MoE
    - agent-simple-core: ["openrouter-auto", "local-qwen-3.6"]
    - agent-medium-core: ["openrouter-auto", "local-qwen-3.6"]
    - agent-complex-core: ["openrouter-auto", "local-qwen-3.6"]
    - agent-advanced-core: ["openrouter-auto", "local-qwen-3.6"]

litellm_settings:
  detailed_debug: false
  callbacks: ["langfuse"]
  drop_params: true
  cache: true
  caching_backend: "redis"
  cache_params:
    mode: "default"
    ttl: 3600
    type: "redis"
    host: "127.0.0.1"
    port: 6379

# Vector store configuration for zero-cost semantic caching
# Uses local nomic-embed-text-v1.5-Q4_K_M via llama-server (no OpenRouter costs)
# Model: nomic-embed-text-v1.5-Q4_K_M (GGUF ~137MB) with CLS pooling, 768-dim vectors
# Configured in /home/gpav/Vrac/LAB/AI/models.ini [nomic-embed-text-v1.5-Q4_K_M]
# llama-server runs with --models-max 3 to keep classifier + MoE + embed loaded
vector_store_settings:
  store_type: "postgres"
  connection_string: "postgresql://postgres:postgres-local-pw-2026@127.0.0.1:5432/postgres"
  collection_name: "litellm_semantic_cache"
  embedding_model: "local-nomic-embed"

# Shared local Valkey cache connection profile
redis_settings:
  redis_host: "127.0.0.1"
  redis_port: 6379
