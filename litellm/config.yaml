general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
litellm_settings:
  # -------------------------------------------------------------------------
  # FALLBACK CHAINS (cascading, in order of escalation)
  # Simple → medium → complex → reasoning → advanced → openrouter-auto
  # When one tier fails, LiteLLM tries the next model in the chain.
  # All tiers fall back through increasingly capable models, then to openrouter-auto.
  # local-qwen-3.6 (35B) disabled 2026-06-08 — frees 23GB RAM/GTT.
  # -------------------------------------------------------------------------
  cache: true
  cache_params:
    host: 127.0.0.1
    mode: default
    port: VALKEY_CACHE_PORT_PLACEHOLDER
    ttl: 3600
    type: redis
  caching_backend: redis
  callbacks:
  - langfuse
  detailed_debug: false
  drop_params: true
  public_model_groups:
    - openrouter-auto
    - llm-routing-ollama
    - ollama-deepseek-v4-pro
    - ollama-deepseek-v4-flash
    - agent-advanced-core
    - agent-reasoning-core
    - agent-complex-core
    - agent-medium-core
    - agent-simple-core
  fallbacks:
  - agent-simple-core:
    - agent-medium-core
    - agent-complex-core
    - agent-reasoning-core
    - agent-advanced-core
    - llm-routing-ollama
    - openrouter-auto
    - local-qwen-3.6
  - agent-medium-core:
    - agent-complex-core
    - agent-reasoning-core
    - agent-advanced-core
    - llm-routing-ollama
    - openrouter-auto
    - local-qwen-3.6
  - agent-complex-core:
    - agent-reasoning-core
    - agent-advanced-core
    - llm-routing-ollama
    - openrouter-auto
    - local-qwen-3.6
  - agent-reasoning-core:
    - agent-advanced-core
    - llm-routing-ollama
    - openrouter-auto
    - local-qwen-3.6
  - agent-advanced-core:
    - llm-routing-ollama
    - openrouter-auto
    - local-qwen-3.6

model_list:
- litellm_params:
    model: openrouter/openrouter/auto
    request_timeout: 120
  model_name: openrouter-auto
  model_info:
    supports_vision: true
    supports_reasoning: true
    supports_function_calling: true
    mode: chat
    max_tokens: 2000000
    max_input_tokens: 2000000
    is_public_model_group: true
- litellm_params:
    model: openai/llm-routing-ollama
    api_base: http://127.0.0.1:ROUTER_PORT_PLACEHOLDER/v1
    api_key: os.environ/LITELLM_MASTER_KEY
    request_timeout: 120
  model_name: llm-routing-ollama
  model_info:
    supports_vision: true
    supports_reasoning: true
    supports_function_calling: true
    mode: chat
    max_tokens: 524288
    max_input_tokens: 524288
    is_public_model_group: true

# Re-enabled 2026-07-08 — llama.cpp, canonical endpoint set via .env
- litellm_params:
    api_base: LLAMA_CLASSIFIER_URL_PLACEHOLDER
    api_key: local-token
    model: openai/local-qwen-3.6
    request_timeout: 300
  model_name: local-qwen-3.6
- litellm_params:
    api_base: LLAMA_CLASSIFIER_URL_PLACEHOLDER
    api_key: local-token
    model: openai/nomic-embed-text-v1.5-Q4_K_M
    request_timeout: 30
  model_name: local-nomic-embed

# ================================================================================
# OLLAMA PAID TIER — ollama.com via LiteLLM's native ollama_chat provider.
# LiteLLM calls https://api.ollama.com/api/chat with Bearer auth (OLLAMA_API_KEY).
# No LiteLLM-level fallbacks: failures propagate back to the triage router
# (router/main.py) which manages Ollama cooldowns internally. When Ollama fails,
# the router activates a 5-minute cooldown and skips Ollama on subsequent
# requests, returning 429 so LiteLLM falls through to openrouter-auto.
# ================================================================================
- model_name: ollama-deepseek-v4-pro
  litellm_params:
    model: ollama_chat/deepseek-v4-pro
    api_base: https://api.ollama.com
    api_key: os.environ/OLLAMA_API_KEY
    request_timeout: 120
  model_info:
    supports_vision: true
    supports_reasoning: true
    supports_function_calling: true
    mode: chat
    max_tokens: 524288
    max_input_tokens: 524288
    input_cost_per_token: 0.00000174
    output_cost_per_token: 0.00000348
    is_public_model_group: true

# ================================================================================
# OLLAMA FLASH TIER — lighter/faster model for reasoning-tier requests.
# Same cooldown architecture as the pro tier above.
# ================================================================================
- model_name: ollama-deepseek-v4-flash
  litellm_params:
    model: ollama_chat/deepseek-v4-flash
    api_base: https://api.ollama.com
    api_key: os.environ/OLLAMA_API_KEY
    request_timeout: 120
  model_info:
    supports_vision: true
    supports_reasoning: true
    supports_function_calling: true
    mode: chat
    max_tokens: 524288
    max_input_tokens: 524288
    input_cost_per_token: 0.00000014
    output_cost_per_token: 0.00000028
    is_public_model_group: true

# ================================================================================
# AGENT TIER DEPLOYMENTS — safety-net entries (one per tier)
# The DB roster sync (router/main.py) is the DYNAMIC source of truth and
# registers the full AA-scored deployment pool at startup via LiteLLM's
# /model/new admin API. These static entries guarantee each tier name exists
# even before the first roster sync runs (prevents "model not found" on cold
# start). Each tier gets exactly ONE reliable free model that is always
# available. The roster sync adds the remaining AA-scored models on startup.
#
# TIER THRESHOLDS (normalized AA score):
#   n >= 80 → agent-advanced-core
#   n >= 75 → agent-reasoning-core
#   n >= 68 → agent-complex-core
#   n >= 60 → agent-medium-core
#   else    → agent-simple-core
#
# CURRENT AA SCORES (2026-06-08, max=55.0):
#   minimax/minimax-m2.5:free          → 55.0 (norm=100.0) — advanced safety net
#   moonshotai/kimi-k2.6:free           → 54.0 (norm=98.2)  — reasoning safety net
#   nvidia/nemotron-3-ultra-550b-a55b   → 48.0 (norm=87.3)  — complex safety net
#   google/gemma-4-26b-a4b-it:free      → 40.0 (norm=72.7)  — medium safety net
#   nvidia/nemotron-3-nano-30b-a3b:free → 28.0 (norm=50.9)  — simple safety net
# ================================================================================

- model_name: agent-advanced-core
  litellm_params:
    model: openrouter/google/gemma-4-31b-it:free
    request_timeout: 20
  model_info:
    supports_vision: false
    supports_reasoning: true
    supports_function_calling: true
    mode: chat
    max_tokens: 262144
    max_input_tokens: 262144
    is_public_model_group: true
- model_name: agent-reasoning-core
  litellm_params:
    model: openrouter/google/gemma-4-26b-a4b-it:free
    request_timeout: 20
  model_info:
    supports_vision: false
    supports_reasoning: true
    supports_function_calling: true
    mode: chat
    max_tokens: 262144
    max_input_tokens: 262144
    is_public_model_group: true
- model_name: agent-complex-core
  litellm_params:
    model: openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
    request_timeout: 20
  model_info:
    supports_vision: false
    supports_reasoning: true
    supports_function_calling: true
    mode: chat
    max_tokens: 262144
    max_input_tokens: 262144
    is_public_model_group: true
- model_name: agent-medium-core
  litellm_params:
    model: openrouter/google/gemma-4-26b-a4b-it:free
    request_timeout: 20
  model_info:
    supports_vision: false
    supports_reasoning: true
    supports_function_calling: true
    mode: chat
    max_tokens: 262144
    max_input_tokens: 262144
    is_public_model_group: true
- model_name: agent-simple-core
  litellm_params:
    model: openrouter/nvidia/nemotron-3-nano-30b-a3b:free
    request_timeout: 20
  model_info:
    supports_vision: false
    supports_reasoning: true
    supports_function_calling: true
    mode: chat
    max_tokens: 256000
    max_input_tokens: 256000
    is_public_model_group: true

redis_settings:
  redis_host: 127.0.0.1
  redis_port: VALKEY_CACHE_PORT_PLACEHOLDER
router_settings:
  allowed_fails: 0
  cooldown_time: 300
  enable_pre_call_checks: false
  num_retries: 1
  routing_strategy: latency-based-routing
  enable_health_check_routing: false
  # NOTE: allowed_fails_policy is an enterprise-only feature in LiteLLM.
  # allowed_fails is set to 0 to ensure that any model deployment failure
  # immediately escalates through the fallback chain (to fallback models)
  # instead of retrying the failed model. This does not interfere with the
  # triage router's internal cooldowns, which return 429 when a specific
  # backend (like Ollama) is cooling down, allowing LiteLLM to immediately
  # trigger the fallback path.
vector_store_settings:
  collection_name: litellm_semantic_cache
  connection_string: os.environ/DATABASE_URL
  embedding_model: local-nomic-embed
  store_type: postgres
