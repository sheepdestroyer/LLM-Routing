model_list:
  # =========================================================================
  # COMPLEX TIERS: OpenRouter Nemotron (Free) -> Local Qwen MoE (Optimized)
  # =========================================================================
  - model_name: agent-complex-core
    litellm_params:
      model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
      api_key: "os.environ/OPENROUTER_API_KEY"

  - model_name: local-qwen-3.6-complex
    litellm_params:
      model: openai/qwen-35b-q5kxl
      api_base: http://127.0.0.1:8080/v1
      api_key: local-token
      request_timeout: 300

  # =========================================================================
  # SIMPLE TIERS: OpenRouter Gemma 4 -> Local Qwen Fast (Optimized)
  # =========================================================================
  - model_name: agent-simple-core
    litellm_params:
      model: openrouter/google/gemma-4-26b-a4b-it:free
      api_key: "os.environ/OPENROUTER_API_KEY"

  - model_name: local-qwen-3.6-simple
    litellm_params:
      model: openai/qwen-35b-q4ks
      api_base: http://127.0.0.1:8080/v1
      api_key: local-token
      request_timeout: 300

# =========================================================================
# GLOBAL SYSTEM POLICIES
# =========================================================================
router_settings:
  enable_fallbacks: true
  cooldown_time: 45
  allowed_fails: 1
  retry_after_cooldown: true
  fallbacks:
    - agent-complex-core: ["local-qwen-3.6-complex"]
    - agent-simple-core: ["local-qwen-3.6-simple"]

litellm_settings:
  callbacks: ["langfuse"]
  drop_params: true
  caching: true
  caching_backend: "redis"

# Shared local Valkey cache connection profile
redis_settings:
  redis_host: "127.0.0.1"
  redis_port: 6379
