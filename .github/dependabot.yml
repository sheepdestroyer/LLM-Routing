version: 2
updates:
  # Docker image dependency updates
  - package-ecosystem: "docker"
    directory: "/router"
    schedule:
      interval: "daily"
      time: "11:22"
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: "/"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    reviewers:
      - "sheepdestroyer"
    allow:
      - dependency-type: "direct"

  # GitHub Actions dependency updates (optional - add if using GH Actions)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: "/"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    reviewers:
      - "sheepdestroyer"
