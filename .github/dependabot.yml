version: 2

# Example registries block — reference repo-level secrets for private registries
#registries:
#  ghcr:
#    type: "docker-registry"
#    url: "https://ghcr.io"
#    username: "${{secrets.GHCR_USERNAME}}"
#    password: "${{secrets.GHCR_TOKEN}}"
#  dockerhub:
#    type: "docker-registry"
