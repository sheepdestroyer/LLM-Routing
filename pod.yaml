apiVersion: v1
kind: Pod
metadata:
  name: agent-router-pod
spec:
  hostNetwork: true
  containers:
    # --- CORE TIER 1: VALKEY CACHE ---
    - name: valkey-cache
      image: docker.io/valkey/valkey:8-alpine
      command: ["valkey-server", "--protected-mode", "no"]
      volumeMounts:
        - name: valkey-storage
          mountPath: /data

    # --- CORE TIER 2: LITELLM GATEWAY ---
    - name: litellm-gateway
      image: ghcr.io/berriai/litellm:latest
      args: ["--config", "/app/config.yaml", "--port", "4000"]
      env:
        - name: LITELLM_MASTER_KEY
          value: "DYNAMIC_LITELLM_MASTER_KEY_PLACEHOLDER"
        - name: UI_USERNAME
          value: "admin"
        - name: UI_PASSWORD
          value: "DYNAMIC_LITELLM_MASTER_KEY_PLACEHOLDER"
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres-local-pw-2026@127.0.0.1:5432/postgres"
        - name: GEMINI_OAUTH_TOKEN
          value: "DYNAMIC_GEMINI_TOKEN_PLACEHOLDER"
        - name: OPENROUTER_API_KEY
          value: "DYNAMIC_OPENROUTER_KEY_PLACEHOLDER"
        - name: LANGFUSE_PUBLIC_KEY
          value: "DYNAMIC_LANGFUSE_PUBLIC_KEY_PLACEHOLDER"
        - name: LANGFUSE_SECRET_KEY
          value: "DYNAMIC_LANGFUSE_SECRET_KEY_PLACEHOLDER"
        - name: LANGFUSE_HOST
          value: "http://127.0.0.1:3000"
      volumeMounts:
        - name: litellm-config
          mountPath: /app/config.yaml
          subPath: config.yaml

    # --- CORE TIER 3: CUSTOM LLMROUTER ---
    - name: llm-triage-router
      image: localhost/llm-triage-router:latest
      env:
        - name: LITELLM_MASTER_KEY
          value: "DYNAMIC_LITELLM_MASTER_KEY_PLACEHOLDER"
      volumeMounts:
        - name: router-config
          mountPath: /config/config.yaml
          subPath: config.yaml
        - name: gemini-secrets
          mountPath: /config/gemini_auth

    # --- OBSERVABILITY TIER 4: POSTGRESQL DB ---
    - name: postgres-db
      image: docker.io/library/postgres:16-alpine
      env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "postgres-local-pw-2026"
        - name: POSTGRES_DB
          value: "langfuse"
      volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

    # --- OBSERVABILITY TIER 5: LANGFUSE SERVER ---
    - name: langfuse-server
      image: docker.io/langfuse/langfuse:2
      env:
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres-local-pw-2026@127.0.0.1:5432/langfuse"
        - name: NEXTAUTH_SECRET
          value: "my-super-secret-nextauth-token-2026"
        - name: SALT
          value: "my-super-strong-salt-token-2026-value-1234"
        - name: NEXTAUTH_URL
          value: "http://localhost:3000"
        - name: HOSTNAME
          value: "0.0.0.0"
        - name: PORT
          value: "3000"
        - name: TELEMETRY_ENABLED
          value: "false"
        - name: LANGFUSE_INIT_ORG_NAME
          value: "Local Development"
        - name: LANGFUSE_INIT_PROJECT_NAME
          value: "Triage Gateway"
        - name: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
          value: "pk-lf-gateway-token"
        - name: LANGFUSE_INIT_PROJECT_SECRET_KEY
          value: "sk-lf-gateway-token"
      volumeMounts:
        - name: langfuse-storage
          mountPath: /app/data

  volumes:
    - name: valkey-storage
      hostPath:
        path: /home/gpav/Vrac/LAB/AI/LLM-Routing/valkey-data
    - name: litellm-config
      hostPath:
        path: /home/gpav/Vrac/LAB/AI/LLM-Routing/litellm
    - name: router-config
      hostPath:
        path: /home/gpav/Vrac/LAB/AI/LLM-Routing/router
    - name: postgres-storage
      hostPath:
        path: /home/gpav/Vrac/LAB/AI/LLM-Routing/postgres-data
    - name: langfuse-storage
      hostPath:
        path: /home/gpav/Vrac/LAB/AI/LLM-Routing/langfuse-data
    - name: gemini-secrets
      hostPath:
        path: /home/gpav/.gemini
