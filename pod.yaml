apiVersion: v1
kind: Pod
metadata:
  name: POD_NAME_PLACEHOLDER
spec:
  containers:
  # Valkey Cache — LiteLLM response cache (exact-match & semantic)
  - command:
    - valkey-server
    - --bind
    - 127.0.0.1
    - --port
    - 'VALKEY_CACHE_PORT_PLACEHOLDER'
    - --loglevel
    - warning
    image: valkey/valkey:9.1.1
    livenessProbe:
      exec:
        command:
        - valkey-cli
        - -p
        - 'VALKEY_CACHE_PORT_PLACEHOLDER'
        - ping
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
    name: valkey-cache
    readinessProbe:
      exec:
        command:
        - valkey-cli
        - -p
        - 'VALKEY_CACHE_PORT_PLACEHOLDER'
        - ping
      initialDelaySeconds: 2
      periodSeconds: 5
      timeoutSeconds: 2
    volumeMounts:
    - mountPath: /data
      name: valkey-storage
  # LiteLLM Gateway — upstream proxy with adaptive routing
  - command:
    - python3
    - /app/entrypoint.py
    env:
    - name: DATABASE_URL
      value: postgresql://postgres:POSTGRES_PASSWORD_ENCODED_PLACEHOLDER@127.0.0.1:POSTGRES_PORT_PLACEHOLDER/postgres
    - name: STORE_MODEL_IN_DB
      value: 'True'
    - name: LITELLM_LOG
      value: INFO
    - name: LANGFUSE_HOST
      value: http://127.0.0.1:LANGFUSE_WEB_PORT_PLACEHOLDER
    - name: LITELLM_MASTER_KEY
      value: LITELLM_MASTER_KEY_PLACEHOLDER
    - name: LITELLM_UI_USERNAME
      value: LITELLM_UI_USERNAME_PLACEHOLDER
    - name: LITELLM_UI_PASSWORD
      value: LITELLM_UI_PASSWORD_PLACEHOLDER
    - name: OLLAMA_API_KEY
      value: OLLAMA_API_KEY_PLACEHOLDER
    - name: OPENROUTER_API_KEY
      value: OPENROUTER_API_KEY_PLACEHOLDER
    - name: SERVER_ROOT_PATH
      value: /llm-routing/litellm
    - name: PROXY_BASE_URL
      value: PROXY_BASE_URL_PLACEHOLDER
    - name: LITELLM_PORT
      value: 'LITELLM_PORT_PLACEHOLDER'
    - name: POSTGRES_PORT
      value: 'POSTGRES_PORT_PLACEHOLDER'
    image: ghcr.io/berriai/litellm:v1.92.0
    livenessProbe:
      exec:
        command:
        - python3
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:LITELLM_PORT_PLACEHOLDER/health/liveness')
      initialDelaySeconds: 240
      periodSeconds: 15
      timeoutSeconds: 5
    name: litellm-gateway
    readinessProbe:
      exec:
        command:
        - python3
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:LITELLM_PORT_PLACEHOLDER/health/readiness')
      initialDelaySeconds: 45
      periodSeconds: 10
      timeoutSeconds: 5
    volumeMounts:
    - mountPath: /app/config.yaml
      name: litellm-rendered
      subPath: config.yaml
    - mountPath: /app/entrypoint.py
      name: litellm-rendered
      subPath: entrypoint.py
    - mountPath: /config/.env
      name: env-file
      subPath: .env
    - mountPath: /config/gemini_auth
      name: gemini-secrets
  # LLM Triage Router — classification + routing gateway
  - args:
    - set -a && . /config/.env && set +a && LITELLM_PORT=LITELLM_PORT_PLACEHOLDER VALKEY_CACHE_PORT=VALKEY_CACHE_PORT_PLACEHOLDER exec uvicorn main:app --host 0.0.0.0 --port ROUTER_PORT_PLACEHOLDER --log-level ${LOG_LEVEL:-warning}
    command:
    - /bin/sh
    - -c
    env:
    - name: CONFIG_PATH
      value: /config/router_dir/config.yaml
    - name: LITELLM_CONFIG_PATH
      value: /config/litellm_dir/config.yaml
    - name: DATABASE_URL
      value: postgresql://postgres:POSTGRES_PASSWORD_ENCODED_PLACEHOLDER@127.0.0.1:POSTGRES_PORT_PLACEHOLDER/postgres
    - name: DBUS_SESSION_BUS_ADDRESS
      value: unix:path=RUN_USER_PLACEHOLDER/bus
    - name: LITELLM_MASTER_KEY
      value: LITELLM_MASTER_KEY_PLACEHOLDER
    - name: LANGFUSE_PUBLIC_KEY
      value: LANGFUSE_PUBLIC_KEY_PLACEHOLDER
    - name: LANGFUSE_SECRET_KEY
      value: LANGFUSE_SECRET_KEY_PLACEHOLDER
    - name: LANGFUSE_HOST
      value: http://127.0.0.1:LANGFUSE_WEB_PORT_PLACEHOLDER
    - name: OLLAMA_API_KEY
      value: OLLAMA_API_KEY_PLACEHOLDER
    - name: PUBLIC_BASE_URL
      value: PUBLIC_BASE_URL_PLACEHOLDER
    - name: ROUTING_DOMAIN
      value: ROUTING_DOMAIN_PLACEHOLDER
    - name: LITELLM_PORT
      value: 'LITELLM_PORT_PLACEHOLDER'
    - name: VALKEY_CACHE_PORT
      value: 'VALKEY_CACHE_PORT_PLACEHOLDER'
    - name: ROUTER_PORT
      value: 'ROUTER_PORT_PLACEHOLDER'
    - name: LANGFUSE_WEB_PORT
      value: 'LANGFUSE_WEB_PORT_PLACEHOLDER'
    - name: LOG_LEVEL
      value: info
    image: ROUTER_IMAGE_PLACEHOLDER
    livenessProbe:
      exec:
        command:
        - python3
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:ROUTER_PORT_PLACEHOLDER/metrics')
      initialDelaySeconds: 240
      periodSeconds: 15
      timeoutSeconds: 5
    name: llm-triage-router
    readinessProbe:
      exec:
        command:
        - python3
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:ROUTER_PORT_PLACEHOLDER/metrics')
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
    volumeMounts:
    - mountPath: /config/router_dir
      name: router-config
    - mountPath: /config/litellm_dir
      name: litellm-rendered
    - mountPath: /app/data
      name: dataset-data
    - mountPath: /config/gemini_auth
      name: gemini-secrets
    - mountPath: /root/.gemini
      name: gemini-secrets
    - mountPath: /config/goose_sessions
      name: goose-sessions
    - mountPath: /usr/local/bin/agy
      name: agy-bin
      subPath: agy
    - mountPath: RUN_USER_PLACEHOLDER/bus
      name: dbus-socket
    - mountPath: /root/.local/share/keyrings
      name: keyring-store
    - mountPath: RUN_USER_PLACEHOLDER
      name: xdg-runtime
    - mountPath: /config/.env
      name: env-file
      subPath: .env
  # PostgreSQL — Langfuse + LiteLLM metadata store
  - env:
    - name: POSTGRES_USER
      value: postgres
    - name: POSTGRES_PASSWORD
      value: POSTGRES_PASSWORD_RAW_PLACEHOLDER
    - name: POSTGRES_DB
      value: langfuse
    - name: PGDATA
      value: /var/lib/postgresql/data/pg18
    - name: PGPORT
      value: 'POSTGRES_PORT_PLACEHOLDER'
    image: pgvector/pgvector:0.8.5-pg18
    livenessProbe:
      exec:
        command:
        - pg_isready
        - -U
        - postgres
        - -p
        - 'POSTGRES_PORT_PLACEHOLDER'
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
    name: postgres-db
    readinessProbe:
      exec:
        command:
        - pg_isready
        - -U
        - postgres
        - -p
        - 'POSTGRES_PORT_PLACEHOLDER'
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 5
    volumeMounts:
    - mountPath: /var/lib/postgresql
      name: postgres-storage
  # ClickHouse — Langfuse v3 OLAP trace/observation store
  - env:
    - name: CLICKHOUSE_DB
      value: default
    - name: CLICKHOUSE_USER
      value: clickhouse
    - name: CLICKHOUSE_PASSWORD
      value: CLICKHOUSE_PASSWORD_PLACEHOLDER
    image: clickhouse/clickhouse-server:26.6.1.1193
    livenessProbe:
      exec:
        command:
        - clickhouse-client
        - --host
        - 127.0.0.1
        - --port
        - 'CLICKHOUSE_TCP_PORT_PLACEHOLDER'
        - --user
        - clickhouse
        - --password
        - CLICKHOUSE_PASSWORD_PLACEHOLDER
        - --query
        - SELECT 1
      initialDelaySeconds: 20
      periodSeconds: 15
      timeoutSeconds: 5
    name: clickhouse-db
    readinessProbe:
      exec:
        command:
        - clickhouse-client
        - --host
        - 127.0.0.1
        - --port
        - 'CLICKHOUSE_TCP_PORT_PLACEHOLDER'
        - --user
        - clickhouse
        - --password
        - CLICKHOUSE_PASSWORD_PLACEHOLDER
        - --query
        - SELECT 1
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
    user: 101:101
    volumeMounts:
    - mountPath: /var/lib/clickhouse
      name: clickhouse-storage
    - mountPath: /etc/clickhouse-server/config.d/port-override.xml
      name: clickhouse-port-config
      subPath: port-override.xml
  # Valkey LF — Langfuse v3 BullMQ job queue
  - command:
    - redis-server
    - --bind
    - 127.0.0.1
    - --port
    - 'VALKEY_LF_PORT_PLACEHOLDER'
    - --requirepass
    - REDIS_AUTH_PLACEHOLDER
    - --maxmemory-policy
    - noeviction
    - --loglevel
    - warning
    image: valkey/valkey:9.1.1
    livenessProbe:
      exec:
        command:
        - valkey-cli
        - -p
        - "VALKEY_LF_PORT_PLACEHOLDER"
        - -a
        - REDIS_AUTH_PLACEHOLDER
        - ping
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
    name: valkey-lf
    readinessProbe:
      exec:
        command:
        - valkey-cli
        - -p
        - "VALKEY_LF_PORT_PLACEHOLDER"
        - -a
        - REDIS_AUTH_PLACEHOLDER
        - ping
      initialDelaySeconds: 2
      periodSeconds: 5
      timeoutSeconds: 2
    volumeMounts:
    - mountPath: /data
      name: redis-lf-storage
  # Langfuse Web — observability dashboard
  - env:
    - name: DATABASE_URL
      value: postgresql://postgres:POSTGRES_PASSWORD_ENCODED_PLACEHOLDER@127.0.0.1:POSTGRES_PORT_PLACEHOLDER/langfuse
    - name: NEXTAUTH_SECRET
      value: NEXTAUTH_SECRET_PLACEHOLDER
    - name: NEXTAUTH_URL
      value: NEXTAUTH_URL_PLACEHOLDER
    - name: SALT
      value: SALT_PLACEHOLDER
    - name: ENCRYPTION_KEY
      value: ENCRYPTION_KEY_PLACEHOLDER
    - name: HOSTNAME
      value: 0.0.0.0
    - name: PORT
      value: 'LANGFUSE_WEB_PORT_PLACEHOLDER'
    - name: TELEMETRY_ENABLED
      value: 'false'
    - name: LANGFUSE_S3_EVENT_UPLOAD_BUCKET
      value: langfuse-events
    - name: LANGFUSE_S3_EVENT_UPLOAD_REGION
      value: us-east-1
    - name: LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID
      value: MINIO_USER_PLACEHOLDER
    - name: LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY
      value: MINIO_PASSWORD_PLACEHOLDER
    - name: LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT
      value: http://127.0.0.1:MINIO_S3_PORT_PLACEHOLDER
    - name: S3_FORCE_PATH_STYLE
      value: 'true'
    - name: CLICKHOUSE_URL
      value: http://127.0.0.1:CLICKHOUSE_HTTP_PORT_PLACEHOLDER
    - name: CLICKHOUSE_MIGRATION_URL
      value: clickhouse://127.0.0.1:CLICKHOUSE_TCP_PORT_PLACEHOLDER
    - name: CLICKHOUSE_USER
      value: clickhouse
    - name: CLICKHOUSE_PASSWORD
      value: CLICKHOUSE_PASSWORD_PLACEHOLDER
    - name: CLICKHOUSE_CLUSTER_ENABLED
      value: 'false'
    - name: REDIS_HOST
      value: 127.0.0.1
    - name: REDIS_PORT
      value: 'VALKEY_LF_PORT_PLACEHOLDER'
    - name: REDIS_AUTH
      value: REDIS_AUTH_PLACEHOLDER
    - name: LANGFUSE_INIT_ORG_ID
      value: org-local-dev-id
    - name: LANGFUSE_INIT_ORG_NAME
      value: Local Development
    - name: LANGFUSE_INIT_PROJECT_ID
      value: proj-triage-gateway-id
    - name: LANGFUSE_INIT_PROJECT_NAME
      value: Triage Gateway
    - name: LANGFUSE_INIT_USER_EMAIL
      value: admin@local.dev
    - name: LANGFUSE_INIT_USER_PASSWORD
      value: LANGFUSE_INIT_USER_PASSWORD_PLACEHOLDER
    - name: LANGFUSE_LOG_LEVEL
      value: warn
    image: langfuse/langfuse:3.212.0
    livenessProbe:
      exec:
        command:
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1:LANGFUSE_WEB_PORT_PLACEHOLDER/api/public/health
      initialDelaySeconds: 240
      periodSeconds: 15
      timeoutSeconds: 5
    name: langfuse-web
    readinessProbe:
      exec:
        command:
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1:LANGFUSE_WEB_PORT_PLACEHOLDER/api/public/health
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
  # Langfuse Worker — background job processor
  - env:
    - name: DATABASE_URL
      value: postgresql://postgres:POSTGRES_PASSWORD_ENCODED_PLACEHOLDER@127.0.0.1:POSTGRES_PORT_PLACEHOLDER/langfuse
    - name: CLICKHOUSE_URL
      value: http://127.0.0.1:CLICKHOUSE_HTTP_PORT_PLACEHOLDER
    - name: CLICKHOUSE_USER
      value: clickhouse
    - name: CLICKHOUSE_PASSWORD
      value: CLICKHOUSE_PASSWORD_PLACEHOLDER
    - name: CLICKHOUSE_CLUSTER_ENABLED
      value: 'false'
    - name: REDIS_HOST
      value: 127.0.0.1
    - name: REDIS_PORT
      value: 'VALKEY_LF_PORT_PLACEHOLDER'
    - name: REDIS_AUTH
      value: REDIS_AUTH_PLACEHOLDER
    - name: HOSTNAME
      value: 0.0.0.0
    - name: PORT
      value: 'LANGFUSE_WORKER_PORT_PLACEHOLDER'
    - name: TELEMETRY_ENABLED
      value: 'false'
    - name: LANGFUSE_S3_EVENT_UPLOAD_BUCKET
      value: langfuse-events
    - name: LANGFUSE_S3_EVENT_UPLOAD_REGION
      value: us-east-1
    - name: LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID
      value: MINIO_USER_PLACEHOLDER
    - name: S3_FORCE_PATH_STYLE
      value: 'true'
    - name: LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT
      value: http://127.0.0.1:MINIO_S3_PORT_PLACEHOLDER
    - name: LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY
      value: MINIO_PASSWORD_PLACEHOLDER
    - name: LANGFUSE_LOG_LEVEL
      value: warn
    image: langfuse/langfuse-worker:3.212.0
    livenessProbe:
      exec:
        command:
        - pgrep
        - node
      initialDelaySeconds: 240
      periodSeconds: 15
      timeoutSeconds: 5
    name: langfuse-worker
  # Minio S3 — Langfuse v3 event storage
  - args:
    - server
    - --quiet
    - /data
    - --address
    - ":MINIO_S3_PORT_PLACEHOLDER"
    - --console-address
    - ":MINIO_CONSOLE_PORT_PLACEHOLDER"
    env:
    - name: MINIO_ROOT_USER
      value: MINIO_USER_PLACEHOLDER
    - name: MINIO_ROOT_PASSWORD
      value: MINIO_PASSWORD_PLACEHOLDER
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    livenessProbe:
      httpGet:
        path: /minio/health/live
        port: MINIO_S3_PORT_PLACEHOLDER
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 5
    name: minio-s3
    readinessProbe:
      httpGet:
        path: /minio/health/ready
        port: MINIO_S3_PORT_PLACEHOLDER
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
    volumeMounts:
    - mountPath: /data
      name: minio-storage
  hostNetwork: true
  restartPolicy: Always
  volumes:
  - hostPath:
      path: DATA_ROOT_PLACEHOLDER/valkey-data
    name: valkey-storage
  - hostPath:
      path: DATA_ROOT_PLACEHOLDER/litellm-rendered
      type: DirectoryOrCreate
    name: litellm-rendered
  - hostPath:
      path: DATA_ROOT_PLACEHOLDER/router-rendered
      type: DirectoryOrCreate
    name: router-config
  - hostPath:
      path: DATA_ROOT_PLACEHOLDER/postgres-data
    name: postgres-storage
  - hostPath:
      path: DATA_ROOT_PLACEHOLDER/clickhouse-data
    name: clickhouse-storage
  - hostPath:
      path: DATA_ROOT_PLACEHOLDER/redis-lf-data
    name: redis-lf-storage
  - hostPath:
      path: DATA_ROOT_PLACEHOLDER/minio-data
    name: minio-storage
  - hostPath:
      path: HOME_PLACEHOLDER/.gemini
    name: gemini-secrets
  - hostPath:
      path: HOME_PLACEHOLDER/.local/share/goose
    name: goose-sessions
  - hostPath:
      path: HOME_PLACEHOLDER/.local/bin
    name: agy-bin
  - hostPath:
      path: RUN_USER_PLACEHOLDER/bus
    name: dbus-socket
  - hostPath:
      path: HOME_PLACEHOLDER/.local/share/keyrings
    name: keyring-store
  - hostPath:
      path: RUN_USER_PLACEHOLDER
    name: xdg-runtime
  - hostPath:
      path: WORKDIR_PLACEHOLDER
    name: env-file
  - hostPath:
      path: DATA_ROOT_PLACEHOLDER/datasets
      type: DirectoryOrCreate
    name: dataset-data
  - hostPath:
      path: DATA_ROOT_PLACEHOLDER/clickhouse-config
      type: DirectoryOrCreate
    name: clickhouse-port-config
