apiVersion: v1
kind: Pod
metadata:
  name: agent-router-pod
spec:
  containers:
  # Valkey Cache 9.1.0-alpine — LiteLLM response cache (exact-match & semantic)
  - command:
    - valkey-server
    - --protected-mode
    - 'no'
    - --loglevel
    - warning
    image: valkey/valkey:9.1.0-alpine
    livenessProbe:
      tcpSocket:
        port: 6379
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
    name: valkey-cache
    readinessProbe:
      tcpSocket:
        port: 6379
      initialDelaySeconds: 2
      periodSeconds: 5
      timeoutSeconds: 2
    volumeMounts:
    - mountPath: /data
      name: valkey-storage
  # LiteLLM Gateway — upstream proxy with adaptive routing
  - command:
    - python3
    - /app/entrypoint.py
    env:
    - name: DATABASE_URL
      value: postgresql://postgres:***@127.0.0.1:5432/postgres
    - name: STORE_MODEL_IN_DB
      value: 'True'
    - name: LITELLM_LOG
      value: INFO
    - name: LANGFUSE_HOST
      value: http://127.0.0.1:3001
    - name: LITELLM_MASTER_KEY
      value: sk-lit...33bf
    - name: OLLAMA_API_KEY
      value: 3cd542f8fca14fd08bedfd4f2ab36f9f.6G7Iukbvu1Keyi9x8eKckNEO
    image: ghcr.io/berriai/litellm:v1.89.4
    livenessProbe:
      exec:
        command:
        - python3
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:4000/ping')
      initialDelaySeconds: 240
      periodSeconds: 15
      timeoutSeconds: 5
    name: litellm-gateway
    readinessProbe:
      exec:
        command:
        - python3
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness')
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
    volumeMounts:
    - mountPath: /app/config.yaml
      name: litellm-config
      subPath: config.yaml
    - mountPath: /app/entrypoint.py
      name: litellm-config
      subPath: entrypoint.py
    - mountPath: /config/.env
      name: env-file
      subPath: .env
    - mountPath: /config/gemini_auth
      name: gemini-secrets
  # LLM Triage Router — classification + routing gateway
  - args:
    - set -a && . /config/.env && set +a && exec uvicorn main:app --host 0.0.0.0 --port 5000 --log-level ${LOG_LEVEL:-warning}
    command:
    - /bin/sh
    - -c
    env:
    - name: CONFIG_PATH
      value: /config/router_dir/config.yaml
    - name: LITELLM_CONFIG_PATH
      value: /config/litellm_dir/config.yaml
    - name: DATABASE_URL
      value: postgresql://postgres:***@127.0.0.1:5432/postgres
    - name: DBUS_SESSION_BUS_ADDRESS
      value: unix:path=/run/user/1000/bus
    - name: LITELLM_MASTER_KEY
      value: sk-lit...33bf
    - name: LANGFUSE_PUBLIC_KEY
      value: pk-lf-200bbf48-1d23-447d-a79a-8614106497e6
    - name: LANGFUSE_SECRET_KEY
      value: sk-lf-...3b49
    - name: LANGFUSE_HOST
      value: http://127.0.0.1:3001
    - name: OLLAMA_API_KEY
      value: 3cd542f8fca14fd08bedfd4f2ab36f9f.6G7Iukbvu1Keyi9x8eKckNEO
    - name: LOG_LEVEL
      value: info
    image: localhost/llm-triage-router:latest
    livenessProbe:
      exec:
        command:
        - python3
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:5000/metrics')
      initialDelaySeconds: 20
      periodSeconds: 15
      timeoutSeconds: 5
    name: llm-triage-router
    readinessProbe:
      exec:
        command:
        - python3
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:5000/metrics')
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
    volumeMounts:
    - mountPath: /config/router_dir
      name: router-config
    - mountPath: /config/litellm_dir
      name: litellm-config
    - mountPath: /app/data
      name: dataset-data
    - mountPath: /config/gemini_auth
      name: gemini-secrets
    - mountPath: /root/.gemini
      name: gemini-secrets
    - mountPath: /config/goose_sessions
      name: goose-sessions
    - mountPath: /usr/local/bin/agy
      name: agy-bin
      subPath: agy
    - mountPath: /run/user/1000/bus
      name: dbus-socket
    - mountPath: /root/.local/share/keyrings
      name: keyring-store
    - mountPath: /run/user/1000
      name: xdg-runtime
    - mountPath: /config/.env
      name: env-file
      subPath: .env
  # PostgreSQL — Langfuse + LiteLLM metadata store
  - env:
    - name: POSTGRES_USER
      value: postgres
    - name: POSTGRES_PASSWORD
      value: postgres-password-***
    - name: POSTGRES_DB
      value: langfuse
    image: pgvector/pgvector:0.8.3-pg18
    livenessProbe:
      exec:
        command:
        - pg_isready
        - -U
        - postgres
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
    name: postgres-db
    readinessProbe:
      exec:
        command:
        - pg_isready
        - -U
        - postgres
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 5
    volumeMounts:
    - mountPath: /var/lib/postgresql
      name: postgres-storage
  # ClickHouse — Langfuse v3 OLAP trace/observation store
  - env:
    - name: CLICKHOUSE_DB
      value: default
    - name: CLICKHOUSE_USER
      value: clickhouse
    - name: CLICKHOUSE_PASSWORD
      value: clickhouse
    image: clickhouse/clickhouse-server:26.5.1
    livenessProbe:
      exec:
        command:
        - clickhouse-client
        - --user
        - clickhouse
        - --password
        - clickhouse
        - --query
        - SELECT 1
      initialDelaySeconds: 20
      periodSeconds: 15
      timeoutSeconds: 5
    name: clickhouse-db
    readinessProbe:
      exec:
        command:
        - clickhouse-client
        - --query
        - SELECT 1
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
    user: 101:101
    volumeMounts:
    - mountPath: /var/lib/clickhouse
      name: clickhouse-storage
  # Valkey LF — Langfuse v3 BullMQ job queue
  - command:
    - redis-server
    - --port
    - '6380'
    - --requirepass
    - langfuse-redis-2026
    - --maxmemory-policy
    - noeviction
    - --loglevel
    - warning
    image: valkey/valkey:9.1.0-alpine
    livenessProbe:
      tcpSocket:
        port: 6380
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
    name: valkey-lf
    readinessProbe:
      exec:
        command:
        - valkey-cli
        - -p
        - "6380"
        - -a
        - langfuse-redis-2026
        - ping
      initialDelaySeconds: 2
      periodSeconds: 5
      timeoutSeconds: 2
    volumeMounts:
    - mountPath: /data
      name: redis-lf-storage
  # Langfuse Web — observability dashboard
  - env:
    - name: DATABASE_URL
      value: postgresql://postgres:***@127.0.0.1:5432/langfuse
    - name: NEXTAUTH_SECRET
      value: NEXTAUTH_SECRET_PLACEHOLDER
    - name: NEXTAUTH_URL
      value: http://localhost:3001
    - name: SALT
      value: SALT_PLACEHOLDER
    - name: ENCRYPTION_KEY
      value: ENCRYPTION_KEY_PLACEHOLDER
    - name: HOSTNAME
      value: 0.0.0.0
    - name: PORT
      value: '3001'
    - name: TELEMETRY_ENABLED
      value: 'false'
    - name: LANGFUSE_S3_EVENT_UPLOAD_BUCKET
      value: langfuse-events
    - name: LANGFUSE_S3_EVENT_UPLOAD_REGION
      value: us-east-1
    - name: LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID
      value: minioadmin
    - name: LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY
      value: minioadmin
    - name: LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT
      value: http://127.0.0.1:9002
    - name: S3_FORCE_PATH_STYLE
      value: 'true'
    - name: CLICKHOUSE_URL
      value: http://127.0.0.1:8123
    - name: CLICKHOUSE_MIGRATION_URL
      value: clickhouse://127.0.0.1:9000
    - name: CLICKHOUSE_USER
      value: clickhouse
    - name: CLICKHOUSE_PASSWORD
      value: clickhouse
    - name: CLICKHOUSE_CLUSTER_ENABLED
      value: 'false'
    - name: REDIS_HOST
      value: 127.0.0.1
    - name: REDIS_PORT
      value: '6380'
    - name: REDIS_AUTH
      value: langfuse-redis-2026
    - name: LANGFUSE_INIT_ORG_ID
      value: org-local-dev-id
    - name: LANGFUSE_INIT_ORG_NAME
      value: Local Development
    - name: LANGFUSE_INIT_PROJECT_ID
      value: proj-triage-gateway-id
    - name: LANGFUSE_INIT_PROJECT_NAME
      value: Triage Gateway
    - name: LANGFUSE_INIT_USER_EMAIL
      value: admin@local.dev
    - name: LANGFUSE_INIT_USER_PASSWORD
      value: admin-local-pw-2026
    - name: LANGFUSE_LOG_LEVEL
      value: warn
    image: langfuse/langfuse:3.178.0
    livenessProbe:
      exec:
        command:
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1:3001/api/health
      initialDelaySeconds: 240
      periodSeconds: 15
      timeoutSeconds: 5
    name: langfuse-web
    readinessProbe:
      exec:
        command:
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1:3001/api/health
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
  # Langfuse Worker — background job processor
  - env:
    - name: DATABASE_URL
      value: postgresql://postgres:***@127.0.0.1:5432/langfuse
    - name: CLICKHOUSE_URL
      value: http://127.0.0.1:8123
    - name: CLICKHOUSE_USER
      value: clickhouse
    - name: CLICKHOUSE_PASSWORD
      value: clickhouse
    - name: CLICKHOUSE_CLUSTER_ENABLED
      value: 'false'
    - name: REDIS_HOST
      value: 127.0.0.1
    - name: REDIS_PORT
      value: '6380'
    - name: REDIS_AUTH
      value: langfuse-redis-2026
    - name: HOSTNAME
      value: 0.0.0.0
    - name: PORT
      value: '3030'
    - name: TELEMETRY_ENABLED
      value: 'false'
    - name: LANGFUSE_S3_EVENT_UPLOAD_BUCKET
      value: langfuse-events
    - name: LANGFUSE_S3_EVENT_UPLOAD_REGION
      value: us-east-1
    - name: LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID
      value: minioadmin
    - name: S3_FORCE_PATH_STYLE
      value: 'true'
    - name: LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT
      value: http://127.0.0.1:9002
    - name: LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY
      value: minioadmin
    - name: LANGFUSE_LOG_LEVEL
      value: warn
    image: langfuse/langfuse-worker:3.202.1
    livenessProbe:
      exec:
        command:
        - pgrep
        - node
      initialDelaySeconds: 240
      periodSeconds: 15
      timeoutSeconds: 5
    name: langfuse-worker
  # Minio S3 — Langfuse v3 event storage
  - args:
    - server
    - --quiet
    - /data
    - --address
    - ":9002"
    - --console-address
    - ":9001"
    env:
    - name: MINIO_ROOT_USER
      value: minioadmin
    - name: MINIO_ROOT_PASSWORD
      value: minioadmin
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    livenessProbe:
      httpGet:
        path: /minio/health/live
        port: 9002
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 5
    name: minio-s3
    readinessProbe:
      httpGet:
        path: /minio/health/ready
        port: 9002
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
    volumeMounts:
    - mountPath: /data
      name: minio-storage
  hostNetwork: true
  restartPolicy: Always
  volumes:
  - hostPath:
      path: /home/gpav/Vrac/LAB/AI/LLM-Routing/valkey-data
    name: valkey-storage
  - hostPath:
      path: /home/gpav/Vrac/LAB/AI/LLM-Routing/litellm
    name: litellm-config
  - hostPath:
      path: /home/gpav/Vrac/LAB/AI/LLM-Routing/router
    name: router-config
  - hostPath:
      path: /home/gpav/Vrac/LAB/AI/LLM-Routing/postgres-data
    name: postgres-storage
  - hostPath:
      path: /home/gpav/Vrac/LAB/AI/LLM-Routing/clickhouse-data
    name: clickhouse-storage
  - hostPath:
      path: /home/gpav/Vrac/LAB/AI/LLM-Routing/redis-lf-data
    name: redis-lf-storage
  - hostPath:
      path: /home/gpav/Vrac/LAB/AI/LLM-Routing/minio-data
    name: minio-storage
  - hostPath:
      path: /home/gpav/.gemini
    name: gemini-secrets
  - hostPath:
      path: /home/gpav/.local/share/goose
    name: goose-sessions
  - hostPath:
      path: /home/gpav/.local/bin
    name: agy-bin
  - hostPath:
      path: /run/user/1000/bus
    name: dbus-socket
  - hostPath:
      path: /home/gpav/.local/share/keyrings
    name: keyring-store
  - hostPath:
      path: /run/user/1000
    name: xdg-runtime
  - hostPath:
      path: /home/gpav/Vrac/LAB/AI/LLM-Routing
    name: env-file
  - hostPath:
      path: /home/gpav/Vrac/LAB/AI/LLM-Routing/data
      type: DirectoryOrCreate
    name: dataset-data
